name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:       # manual re-deploy from GitHub UI

# ── OIDC — no AWS keys stored anywhere ────────────────────────────────────────
permissions:
  id-token: write          # required to request the JWT from GitHub's OIDC provider
  contents: read

# ── GitHub Variables (Settings → Variables → Actions) — not secrets ───────────
# AWS_ROLE_ARN   = arn:aws:iam::<account>:role/MedipulseGithubDeploy
# AWS_REGION     = eu-west-1  (or your region)
# ECR_REGISTRY   = <account>.dkr.ecr.<region>.amazonaws.com
# ECS_CLUSTER    = medipulse

env:
  AWS_REGION:    ${{ vars.AWS_REGION }}
  ECR_REGISTRY:  ${{ vars.ECR_REGISTRY }}
  ECS_CLUSTER:   ${{ vars.ECS_CLUSTER }}

# ──────────────────────────────────────────────────────────────────────────────
jobs:

  # ── Job 1: Build both images in parallel ────────────────────────────────────
  build:
    name: Build & Push — ${{ matrix.target }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - target: api
            ecr-repo: medipulse-api
          - target: worker
            ecr-repo: medipulse-worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # BuildKit layer cache — reuses unchanged layers across runs (faster builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Assume the deploy role via OIDC — no stored credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          target:  ${{ matrix.target }}
          push:    ${{ github.ref == 'refs/heads/main' }}   # push only on main, not PRs
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ matrix.ecr-repo }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ matrix.ecr-repo }}:latest
          # Layer cache in ECR — no external cache service needed
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ matrix.ecr-repo }}:cache
          cache-to:   type=registry,ref=${{ env.ECR_REGISTRY }}/${{ matrix.ecr-repo }}:cache,mode=max

  # ── Job 2: Deploy Worker first (safe — only consumes queue) ─────────────────
  deploy-worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production         # requires manual approval if configured in GitHub

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      # Download the live task definition from ECS — it's the source of truth
      - name: Download current Worker task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition medipulse-worker \
            --query taskDefinition \
            > worker-task-def.json

      - name: Render new image into task definition
        id: render-worker
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition:  worker-task-def.json
          container-name:   medipulse-worker
          image:            ${{ env.ECR_REGISTRY }}/medipulse-worker:${{ github.sha }}

      - name: Deploy Worker to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:          ${{ steps.render-worker.outputs.task-definition }}
          service:                  medipulse-worker
          cluster:                  ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true   # blocks until all tasks are healthy

  # ── Job 3: Deploy API after Worker is stable ─────────────────────────────────
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: deploy-worker             # ensures worker handles new queue contracts before API sends them
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Download current API task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition medipulse-api \
            --query taskDefinition \
            > api-task-def.json

      - name: Render new image into task definition
        id: render-api
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition:  api-task-def.json
          container-name:   medipulse-api
          image:            ${{ env.ECR_REGISTRY }}/medipulse-api:${{ github.sha }}

      - name: Deploy API to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:          ${{ steps.render-api.outputs.task-definition }}
          service:                  medipulse-api
          cluster:                  ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
